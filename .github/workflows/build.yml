name: Build Xtreme AI APK
on: [push]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Updated to v4
      
      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.10'
          
      - name: Install Flet & Dependencies
        run: |
          pip install flet
          pip install flet[all]
          
      - name: Build Android APK
        run: flet build apk --release
        
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4 # <-- এই লাইনটি v4 করে দেওয়া হয়েছে (এরর ফিক্স)
        with:
          name: Xtreme-AI-Pro-Edition
          path: build/apk/*.apk
