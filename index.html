<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xtreme AI Plus - IT Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #030712; --card-bg: rgba(31, 41, 55, 0.65); --text: #f8fafc; }
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at top right, #1e293b, var(--bg));
            color: var(--text); font-family: 'Poppins', sans-serif;
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden;
        }
        .container {
            width: 95%; max-width: 800px; height: 90vh; background: var(--card-bg);
            backdrop-filter: blur(20px); border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 24px; display: flex; flex-direction: column; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--primary); text-align: center; margin: 0 0 15px 0; text-shadow: 0 0 10px var(--primary); }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { padding: 12px 18px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; animation: slide 0.3s ease; }
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } }
        .ai-msg { background: rgba(255,255,255,0.05); border-left: 3px solid var(--primary); align-self: flex-start; }
        .user-msg { background: var(--primary); color: #000; font-weight: 500; align-self: flex-end; }
        .input-area { display: flex; gap: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 15px; margin-top: 10px; }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 5px; }
        button { background: var(--primary); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        pre { background: #000 !important; padding: 12px; border-radius: 10px; overflow-x: auto; border: 1px solid #334155; }
        code { color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1>XTREME AI PLUS</h1>
        <div id="chat-box">
            <div class="msg ai-msg"><b>AI:</b> Welcome! How can Xtreme IT Solution help you today?</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-msg" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">SEND</button>
        </div>
    </div>
    <script>
        async function send() {
            let input = document.getElementById('user-msg');
            let msg = input.value.trim();
            let box = document.getElementById('chat-box');
            if(!msg) return;
            box.innerHTML += `<div class="msg user-msg"><b>You:</b> ${msg}</div>`;
            input.value = ''; box.scrollTop = box.scrollHeight;
            const res = await fetch('/chat', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({msg: msg})
            });
            const data = await res.json();
            box.innerHTML += `<div class="msg ai-msg"><b>AI:</b><br>${marked.parse(data.reply)}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
