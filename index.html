<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xtreme AI Pro Edition (Recreated)</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary: #10b981; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.5); --text: #f8fafc; }
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #1e293b, var(--bg));
            color: var(--text); font-family: 'Poppins', sans-serif;
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        
        /* Floating Marquee Bar */
        .floating-bar {
            position: fixed; top: 0; left: 0; width: 100%;
            background: rgba(16, 185, 129, 0.2);
            backdrop-filter: blur(10px);
            color: #10b981; padding: 10px 0;
            font-weight: 600; font-size: 0.9rem; text-align: center;
            border-bottom: 1px solid rgba(16, 185, 129, 0.3); z-index: 1000;
        }

        .container {
            width: 95%; max-width: 800px; height: 85vh; background: var(--card-bg);
            backdrop-filter: blur(25px); border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 20px; display: flex; flex-direction: column; padding: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); margin-top: 40px;
        }
        
        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--primary); text-align: center; margin: 0 0 15px 0; text-shadow: 0 0 10px var(--primary); }
        #chat-box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        .msg { padding: 15px; border-radius: 15px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; animation: slide 0.3s ease; }
        
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } }
        
        .ai-msg { background: rgba(255,255,255,0.05); border-left: 3px solid var(--primary); align-self: flex-start; }
        .user-msg { background: var(--primary); color: #000; font-weight: 600; align-self: flex-end; }
        
        .input-area { display: flex; gap: 10px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 15px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 5px; font-size: 1rem; }
        button { background: var(--primary); border: none; padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px var(--primary); }
        pre { background: #000 !important; padding: 15px; border-radius: 10px; overflow-x: auto; border: 1px solid #334155; }
        code { color: #38bdf8; }
    </style>
</head>
<body>

    <div class="floating-bar">
        <marquee scrollamount="5">Hi, How are you (If you want, you can update the comment so people can see it and ask questions.)</marquee>
    </div>

    <div class="container">
        <h1>XTREME AI PRO EDITION<br><span style="font-size: 0.8rem; color: #94a3b8;">( RECREATED )</span></h1>
        
        <div id="chat-box">
            <div class="msg ai-msg"><b>AI:</b> Hello! Ask me "Who is [name]?" for Wikipedia search, or ask me any coding questions!</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="user-msg" placeholder="Type 'Who is Elon Musk?' or ask a question..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">SEND</button>
        </div>
    </div>

    <script>
        async function send() {
            let input = document.getElementById('user-msg');
            let msg = input.value.trim();
            let box = document.getElementById('chat-box');
            if(!msg) return;
            
            box.innerHTML += `<div class="msg user-msg"><b>You:</b> ${msg}</div>`;
            input.value = ''; box.scrollTop = box.scrollHeight;
            
            try {
                const res = await fetch('/chat', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({msg: msg})
                });
                const data = await res.json();
                box.innerHTML += `<div class="msg ai-msg"><b>AI:</b><br>${marked.parse(data.reply)}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch(e) {
                box.innerHTML += `<div class="msg ai-msg" style="color: red;">Error connecting to server.</div>`;
            }
        }
    </script>
</body>
</html>
