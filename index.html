<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xtreme AI Plus - IT Solution</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #38bdf8;
            --bg: #030712;
            --card-bg: rgba(31, 41, 55, 0.6);
            --text: #f8fafc;
        }

        * { box-sizing: border-box; }

        body {
            background: radial-gradient(circle at top right, #1e293b, var(--bg));
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 850px;
            height: 90vh;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            padding: 20px;
        }

        header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 3px;
            color: var(--primary);
            margin: 0;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        #chat-box {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            margin: 15px 0;
            display: flex;
            flex-direction: column;
        }

        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 85%;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-out;
            font-size: 0.95rem;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } }

        .ai-msg {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            align-self: flex-start;
            border-left: 3px solid var(--primary);
        }

        .user-msg {
            background: var(--primary);
            color: #030712;
            align-self: flex-end;
            font-weight: 500;
        }

        .input-area {
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--primary);
            color: #030712;
            border: none;
            padding: 10px 25px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--primary);
        }

        /* Code Block Styling */
        pre {
            background: #000 !important;
            padding: 15px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid #1e293b;
        }

        code { color: #10b981; font-family: 'Courier New', monospace; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>XTREME AI PLUS</h1>
        </header>

        <div id="chat-box">
            <div class="message ai-msg">
                <b>AI:</b> Welcome! I am Xtreme AI Plus. I can help with IT solutions, math, and code. How can I assist you today?
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-msg" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()">SEND</button>
        </div>
    </div>

    <script>
        async function send() {
            let input = document.getElementById('user-msg');
            let msg = input.value.trim();
            let box = document.getElementById('chat-box');
            if(!msg) return;

            // Show User Message
            box.innerHTML += `<div class="message user-msg"><b>You:</b> ${msg}</div>`;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({msg: msg})
                });
                const data = await res.json();
                
                // Render AI Message with Markdown
                let htmlReply = marked.parse(data.reply);
                box.innerHTML += `<div class="message ai-msg"><b>AI:</b><br>${htmlReply}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch (err) {
                box.innerHTML += `<div class="message ai-msg" style="color: #ef4444;"><b>Error:</b> Could not connect to the server.</div>`;
            }
        }
    </script>
</body>
</html>
